<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>お問い合わせ | 朝日町町内会</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="scrolled">
      <div class="header-inner">
        <div class="logo">
          <a href="index.html">
            <img src="images/logo.png" alt="" />
            <span>朝日町町内会</span>
          </a>
        </div>
      </div>
    </header>

    <section class="container">
      <h2>お問い合わせ</h2>

      <form class="contact-form">
        <label>お名前</label>
        <input type="text" placeholder="山田 太郎" required />

        <label>メールアドレス</label>
        <input type="email" placeholder="example@mail.com" required />

        <label>お問い合わせ内容</label>
        <textarea rows="5" placeholder="内容をご記入ください" required></textarea>

        <button type="submit">送信する</button>
      </form>
      <a href="index.html" class="back-btn">トップへ戻る</a>
    </section>

    <footer>
      <p>© 朝日町町内会</p>
    </footer>
  </body>
</html>
