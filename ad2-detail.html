<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>告知広告詳細</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .ad-wrapper {
      display: flex;
      justify-content: center;
      width: 100%;
      margin: 20px 0;
    }

    .ad-wrapper .ad-image {
      max-width: 500px;
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      border-radius: 6px;
      background-color: #fff;
    }

    .ad-detail .description {
      text-align: center;
      margin: 15px 0;
      font-size: 0.95rem;
    }

    .ad-detail .btn {
      display: inline-block;
      margin: 10px auto 20px;
      padding: 12px 20px;
      border-radius: 8px;
      background-color: #d8c7b7;
      color: #333;
      text-decoration: none;
      text-align: center;
    }
  </style>
</head>
<body>

<section class="ad-detail">
  <h2>告知広告</h2>

  <div class="ad-wrapper">
    <img src="images/ad2.jpg" alt="告知広告" class="ad-image">
  </div>

  <p class="description">
    新商品やイベントの告知用に作成した広告です。視認性と訴求力を意識したデザインにしています。
  </p>

  <a href="index.html" class="btn">←戻る</a>
</section>

</body>
</html>
