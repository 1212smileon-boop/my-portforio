<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>夏祭り | 朝日町町内会</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="sub-page">
    <header>
      <div class="header-inner">
        <h1 class="logo">
          <a href="index.html">
            <img src="images/logo.png" />
            <span>朝日町町内会</span>
          </a>
        </h1>

        <nav>
          <ul class="nav">
            <li><a href="index.html">HOME</a></li>
            <li><a href="index.html#news">お知らせ</a></li>
            <li><a href="index.html#access">アクセス</a></li>
          </ul>
        </nav>

        <div class="menu-btn"><span></span><span></span><span></span></div>
      </div>
    </header>

    <section class="sub-hero">
      <img src="images/festival-hero.jpg" />
      <h1>夏祭り</h1>
    </section>

    <div class="container">
      <p>地域の皆さまと交流する夏祭りを開催します。</p>

      <div class="event-image">
        <img src="images/festival1.jpg" />
      </div>

      <table class="event-table">
        <tr>
          <th>日時</th>
          <td>8月15日 17:00〜</td>
        </tr>
        <tr>
          <th>場所</th>
          <td>中央公園</td>
        </tr>
        <tr>
          <th>内容</th>
          <td>屋台・盆踊り</td>
        </tr>
        <tr>
          <th>参加費</th>
          <td>無料</td>
        </tr>
      </table>

      <div class="back-btn-container">
        <a href="index.html" class="back-btn">トップへ戻る</a>
      </div>

      <div class="map">
        <iframe src="https://www.google.com/maps?q=鹿児島中央公園&output=embed"></iframe>
      </div>
    </div>

    <footer>© 朝日町町内会</footer>

    <script>
      const menuBtn = document.querySelector(".menu-btn");
      const nav = document.querySelector(".nav");

      if (menuBtn && nav) {
        menuBtn.addEventListener("click", function () {
          menuBtn.classList.toggle("active");
          nav.classList.toggle("active");
        });
      }
    </script>
  </body>
</html>
